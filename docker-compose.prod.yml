# Docker Compose para Coolify Cloud.
# Stack completa: Postgres 17 (com pg_repack + pg_partman), Redis, RabbitMQ,
# dashboard Flask (gunicorn) e 4 processos Celery (3 workers + beat).
#
# CONVENCOES OBRIGATORIAS (codigo legado assume):
#   - Servico postgres DEVE se chamar "postgres"  (CONEXAO_DB_URL)
#   - Servico rabbitmq DEVE se chamar "rabbitmq" (broker hardcoded no celery.py)
#   - Servico redis DEVE se chamar "redis"        (REDIS_DB_URL)
#   - .env final em /finops/finops_celery/.env    (path absoluto lido por settings.py)
#
# Apenas o servico "dashboard" expoe porta para o Coolify gerar o dominio HTTPS.

name: finops

services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: finops/postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finopsdatabase}
      POSTGRES_USER: ${POSTGRES_USER:-svc_finops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svc_finops -d finopsdatabase"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      gunicorn --chdir /finops/finops_celery/dashboard
               --bind 0.0.0.0:5000
               --workers 2
               --timeout 120
               --access-logfile -
               --error-logfile -
               wsgi:app
    environment:
      PYTHONUNBUFFERED: "1"
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY obrigatorio}
      ENABLE_AZURE_AUTH: ${ENABLE_AZURE_AUTH:-false}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/summary', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker_verifica:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_verifica_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=1,1
             --time-limit=100000000000
             --queues=verifica_up_date
             --logfile=/finops/finops_celery/logs/finops_verifica.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_faz:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=10,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
             --logfile=/finops/finops_celery/logs/finops_executa.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_faz2:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update2@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=30,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery beat
             --loglevel=INFO
             --logfile=/finops/finops_celery/logs/beat.log
             --pidfile=/tmp/beat.pid
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  app_logs:
