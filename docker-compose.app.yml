# Stack de APLICACAO do FinOps.
# Esta stack eh reconstruida a cada `git push` (build da imagem do app
# Python). NAO inclui postgres/redis/rabbitmq - esses vivem na stack
# `finops-infra` (docker-compose.infra.yml) e sao alcancados via
# network externa compartilhada `finops-infra`.
#
# Esta stack CONECTA na network externa "finops-infra" - todos os
# servicos do app entram nela para resolver `postgres`, `redis` e
# `rabbitmq` por nome (DNS interno do Docker).
#
# CONVENCOES OBRIGATORIAS (codigo legado assume):
#   - Hostnames `postgres`, `redis`, `rabbitmq` (vem da stack infra)
#   - .env final em /finops/finops_celery/.env    (path absoluto lido por settings.py)
#
# Apenas o servico "dashboard" expoe porta para o Coolify gerar o dominio HTTPS.

name: finops-app

networks:
  finops-infra:
    name: finops-infra        # mesma network da stack infra
    external: true            # NAO eh criada por este compose

services:
  dashboard:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      gunicorn --chdir /finops/finops_celery/dashboard
               --bind 0.0.0.0:5000
               --workers 2
               --timeout 120
               --access-logfile -
               --error-logfile -
               wsgi:app
    environment:
      PYTHONUNBUFFERED: "1"
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY obrigatorio}
      ENABLE_AZURE_AUTH: ${ENABLE_AZURE_AUTH:-false}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    ports:
      - "5000:5000"
    networks:
      - finops-infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/summary', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker_verifica:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_verifica_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=1,1
             --time-limit=100000000000
             --queues=verifica_up_date
             --logfile=/finops/finops_celery/logs/finops_verifica.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - finops-infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_faz:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=10,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
             --logfile=/finops/finops_celery/logs/finops_executa.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - finops-infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_faz2:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update2@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=30,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - finops-infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery beat
             --loglevel=INFO
             --logfile=/finops/finops_celery/logs/beat.log
             --pidfile=/tmp/beat.pid
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgres
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - finops-infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  app_logs:
