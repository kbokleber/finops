# Stack de APLICACAO do FinOps.
# Conecta nos servicos de INFRA gerenciados SEPARADAMENTE pelo Coolify:
#   - postgres: kbokleber/custom-postgres:17-extensions (recurso Coolify)
#   - redis:    one-click do Coolify (alias "redis" na network "coolify")
#   - rabbitmq: one-click do Coolify (alias "rabbitmq" na network "s10h0gqm0uqy9jvywig5qrp2")
#
# O Postgres e gerenciado como recurso separado no Coolify (mais limpo:
# backup via UI, restart independente, escala separada).
# A stack finops soh se conecta nele via network compartilhada.
#
# Cada servico de infra (Coolify) cria um ALIAS DNS simples (postgresql, redis,
# rabbitmq), entao usamos os nomes curtos.
#
# O broker do Celery e configurado via env var CELERY_BROKER_URL
# (Celery 5.x NAO aceita --broker no comando `celery worker`).
#
# Apenas o servico "dashboard" expoe porta para o Coolify gerar o dominio HTTPS.

name: finops-app

networks:
  postgres-net:
    external: true
    name: ${POSTGRES_NETWORK:-finops-pg-net}
  redis-net:
    external: true
    name: coolify
  rabbitmq-net:
    external: true
    name: s10h0gqm0uqy9jvywig5qrp2

services:
  dashboard:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      gunicorn --chdir /finops/finops_celery/dashboard
               --bind 0.0.0.0:5000
               --workers 2
               --timeout 120
               --access-logfile -
               --error-logfile -
               wsgi:app
    environment:
      PYTHONUNBUFFERED: "1"
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-please-change-me-in-production-32-chars-min}
      ENABLE_AZURE_AUTH: ${ENABLE_AZURE_AUTH:-false}
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Mesmo broker dos workers, para que o /api/celery-status
      # consiga usar a API inspect do Celery
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    ports:
      - "5000:5000"
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/summary', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker_verifica:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_verifica_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=1,1
             --time-limit=100000000000
             --queues=verifica_up_date
             --logfile=/finops/finops_celery/logs/finops_verifica.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

  worker_faz:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=10,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
             --logfile=/finops/finops_celery/logs/finops_executa.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

  worker_faz2:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update2@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=30,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

  celery_beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    # Watchdog em Python (sem expansao de shell, mais robusto):
    # o beat trava silenciosamente em alguns ambientes (race condition no
    # init_loader durante o boot). Este loop Python reinicia o beat em 5s
    # se o processo morrer, sem depender de expansao de variaveis do sh.
    command: >
      python -c "import subprocess, time, sys
log='/finops/finops_celery/logs/beat.log'
while True:
    print(f'[beat-watchdog] Starting celery beat', flush=True)
    with open(log, 'a') as f:
        f.write('[beat-watchdog] starting celery beat\n')
    rc = subprocess.call([
        'celery', '-A', 'finops_celery', 'beat',
        '--loglevel=INFO',
        '--logfile=' + log,
        '--pidfile=/tmp/beat.pid'
    ])
    print(f'[beat-watchdog] Beat exited rc={rc}, restarting in 5s', flush=True)
    with open(log, 'a') as f:
        f.write(f'[beat-watchdog] exited rc={rc}, restarting in 5s\n')
    time.sleep(5)"
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

volumes:
  app_logs:
