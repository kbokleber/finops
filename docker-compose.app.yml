# Stack de APLICACAO do FinOps.
# Conecta nos servicos one-click do Coolify via networks Docker compartilhadas.
#
# OS 3 SERVICOS DE INFRA (recursos one-click do Coolify):
#   - postgres: postgresql-ywq8py7anh5lmq2gfzb1xpva  (network ywq8py7anh5lmq2gfzb1xpva)
#   - redis:    coolify-redis                          (network coolify)
#   - rabbitmq: rabbitmq-s10h0gqm0uqy9jvywig5qrp2     (network s10h0gqm0uqy9jvywig5qrp2)
#
# Esta stack se anexa a essas 3 networks para alcancar os servicos pelos
# NOMES DOS CONTAINERS (DNS interno do Docker resolve automaticamente).
# NAO precisa de `extra_hosts` (que espera IP literal, nao nome de container).
#
# Apenas o servico "dashboard" expoe porta para o Coolify gerar o dominio HTTPS.

name: finops-app

networks:
  postgres-net:
    external: true
    name: ywq8py7anh5lmq2gfzb1xpva
  redis-net:
    external: true
    name: coolify
  rabbitmq-net:
    external: true
    name: s10h0gqm0uqy9jvywig5qrp2

services:
  dashboard:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      gunicorn --chdir /finops/finops_celery/dashboard
               --bind 0.0.0.0:5000
               --workers 2
               --timeout 120
               --access-logfile -
               --error-logfile -
               wsgi:app
    environment:
      PYTHONUNBUFFERED: "1"
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY obrigatorio}
      ENABLE_AZURE_AUTH: ${ENABLE_AZURE_AUTH:-false}
      DB_HOST: postgresql-ywq8py7anh5lmq2gfzb1xpva
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql-ywq8py7anh5lmq2gfzb1xpva
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: coolify-redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "5000:5000"
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/summary', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker_verifica:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_verifica_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=1,1
             --time-limit=100000000000
             --queues=verifica_up_date
             --broker=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
             --logfile=/finops/finops_celery/logs/finops_verifica.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql-ywq8py7anh5lmq2gfzb1xpva
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql-ywq8py7anh5lmq2gfzb1xpva
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: coolify-redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

  worker_faz:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=10,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
             --broker=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
             --logfile=/finops/finops_celery/logs/finops_executa.log
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql-ywq8py7anh5lmq2gfzb1xpva
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql-ywq8py7anh5lmq2gfzb1xpva
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: coolify-redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

  worker_faz2:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery worker
             -n celery_faz_update2@$${HOSTNAME}
             --loglevel=INFO
             --autoscale=30,1
             --time-limit=100000000000
             --queues=celery,atualizar_nuvem
             --broker=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql-ywq8py7anh5lmq2gfzb1xpva
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql-ywq8py7anh5lmq2gfzb1xpva
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: coolify-redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

  celery_beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: finops/app:latest
    restart: unless-stopped
    command: >
      celery -A finops_celery beat
             --loglevel=INFO
             --broker=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
             --logfile=/finops/finops_celery/logs/beat.log
             --pidfile=/tmp/beat.pid
    environment:
      PYTHONUNBUFFERED: "1"
      DB_HOST: postgresql-ywq8py7anh5lmq2gfzb1xpva
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-svc_finops}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-finopsdatabase}
      CONEXAO_DB_URL: postgresql-ywq8py7anh5lmq2gfzb1xpva
      CONEXAO_DB_PORT: "5432"
      CONEXAO_DB_USER: ${POSTGRES_USER:-svc_finops}
      CONEXAO_DB_SENHA: ${POSTGRES_PASSWORD}
      CONEXAO_DB_DATABASE: ${POSTGRES_DB:-finopsdatabase}
      REDIS_DB_URL: coolify-redis
      REDIS_DB_PORT: "6379"
      REDIS_DB_DATABASE: "0"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq-s10h0gqm0uqy9jvywig5qrp2:5672/
    volumes:
      - app_logs:/finops/finops_celery/logs
    networks:
      - postgres-net
      - redis-net
      - rabbitmq-net

volumes:
  app_logs:
